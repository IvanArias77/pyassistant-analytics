version: '3.8'

services:
  api:
    build: .
    container_name: pyassistant-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite:///./data/pyassistant.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
      - ALLOWED_ORIGINS=http://localhost:8000,http://localhost:3000
    volumes:
      - ./data:/app/data
    restart: unless-stopped